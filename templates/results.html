<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Results - Find The Paper</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    margin: 0;
    color: #1f2937;
}

/* HEADER */
header {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

/* LOGO - Takes u back to home */ 
a {
    text-decoration: none;
    color: #0f172a;
}

a:hover {
    cursor: pointer;
    color: #1e3a8a;
}

/* SEARCH BAR */
.search-bar {
    display: flex;
    gap: 10px;
}

.search-bar input {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #cbd5f5;
    width: 340px;
    outline: none;
    font-size: 20px;
    background: #f9fafb;
}

.search-bar button {
    padding: 10px 16px;
    border: none;
    font-size: 20px;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

/* CONTAINER */
.container {
    max-width: 2200px;
    width: 90%;
    margin: 0 auto;
    padding: 30px 20px;
}

/* RESULT CARD */
.result-item {
    background: white;
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    transition: 0.2s;
    font-size: 24px;
}

.result-item:hover {
    transform: translateY(-3px);
}

/* 🔥 TITLE (UPDATED) */
.result-title {
    font-size: 22px;          /* bigger */
    font-weight: 700;         /* bold */
    color: #2563eb;           /* brighter blue */
    text-decoration: none;
}

.result-title:hover {
    color: #1d4ed8;
    text-decoration: underline;
}

/* ABSTRACT */
.abstract {
    font-size: 18px;
    color: #475569;
    margin: 8px 0;
    font-weight: 400;
    line-height: 1.5;
}

/* META */
.meta {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 6px;
}

/* TAGS */
.tag {
    display: inline-block;
    padding: 4px 10px;
    margin: 4px 4px 0 0;
    border-radius: 999px;
    font-size: 11px;
    background: #e0e7ff;
    color: #1e3a8a;
    font-weight: 500;
}

/* 🔥 LINKS (UPDATED) */
.links {
    margin-top: 8px;
}

.links a {
    margin-right: 15px;
    font-size: 16px;          /* bigger */
    font-weight: 600;         /* bold */
    text-decoration: none;
    color: #2563eb;           /* brighter */
}

.links a:hover {
    color: #1d4ed8;
    text-decoration: underline;
}
</style>
</head>

<body>

<header>
    <a href="/"><h2>Find The Paper</h2></a>

    <form id="searchBar" class="search-bar">
        <input type="text" id="searchInput" placeholder="Search papers again...">
        <button type="submit">Search</button>
    </form>
</header>

<div class="container">
    <h2 id="resultsTitle" style="color:white;">Results</h2>
    <div id="resultsContainer">Loading...</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const query = urlParams.get('query') || '';

if (query) {
    document.getElementById('resultsTitle').textContent = `Results for "${query}"`;
}

async function loadResults() {

    document.getElementById('resultsContainer').innerHTML = "<p style='color:white;'>Loading...</p>";

    try {
        const response = await fetch('/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query.trim() })
        });

        const data = await response.json();

        if (data && data.papers) {
            displayResults(data.papers);
        } else {
            document.getElementById('resultsContainer').innerHTML =
                "<h3 style='color:white;'>No data received</h3>";
        }

    } catch (error) {
        document.getElementById('resultsContainer').innerHTML =
            "<h3 style='color:white;'>Something went wrong 😢</h3>";
    }
}

function displayResults(results) {
    const container = document.getElementById('resultsContainer');

    if (!results || results.length === 0) {
        container.innerHTML = "<h3 style='color:white;'>No results found 😢</h3>";
        return;
    }

    let html = '';

    results.forEach(paper => {

        let subjects = [];
        if (typeof paper.subjects === "string") {
            subjects = paper.subjects.split(';');
        } else if (Array.isArray(paper.subjects)) {
            subjects = paper.subjects;
        }

        html += `
        <div class="result-item">

            <a href="${paper.url}" target="_blank" class="result-title">
                ${escapeHtml(paper.title)}
            </a>

            <p class="abstract">
                ${escapeHtml(paper.abstract || "No abstract available")}
            </p>

            <div class="meta">
                <b>Authors:</b> ${escapeHtml(paper.authors || "Unknown")} |
                <b>Year:</b> ${paper.year || "N/A"}
            </div>
           
            <div>
                ${subjects.map(s => 
                    `<span class="tag">${escapeHtml(s.trim())}</span>`
                ).join('')}
            </div>

            <div class="links">
                <a href="${paper.url}" target="_blank">Open</a>
                ${paper.pdf_link !== "N/A" ? `<a href="${paper.pdf_link}" target="_blank">PDF</a>` : ""}
            </div>

        </div>
        `;
    });

    container.innerHTML = html;
}

document.getElementById("searchBar").addEventListener("submit", function(e){
    e.preventDefault();
    const newQuery = document.getElementById("searchInput").value.trim();

    if(newQuery){
        window.location.href = `/results?query=${encodeURIComponent(newQuery)}`;
    }
});

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

window.onload = function () {
    if (query) {
        loadResults();
    } else {
        document.getElementById('resultsContainer').innerHTML =
            "<h2 style='color:white;'>No query provided</h2>";
    }
};
</script>

</body>
</html>
